name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run eslint
        run: npm run lint:eslint

      - name: Run architecture checks
        run: npm run validate:arch

      - name: Run provider tests
        run: npm run test:providers

      - name: Run domain tests
        run: npm run test:domains

      - name: Build plugin
        run: npm run build
